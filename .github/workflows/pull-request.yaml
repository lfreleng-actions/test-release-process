# Generates a pull request on demand
name: 'Generate Pull Request ⬇️'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  schedule:
    - cron: '40 6 * * 0'

permissions: {}

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  generate-pr:
    name: 'Generate Pull Request ⬇️'
    runs-on: 'ubuntu-24.04'
    permissions:
      contents: write  # Add/update a file in the repository
      pull-requests: write  # Raise the pull request
      issues: write  # Create pull request labels

    timeout-minutes: 5
    steps:
      - name: 'Harden runner 🔒'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - name: 'Checkout local repository ☑️'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 'List existing pull requests 📋'
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          # List pull requests with label/search
          requests=$(gh pr list -l 'automated pr')
          if [ -n "$requests" ]; then
            echo 'Pull requests 💬'
            echo "$requests"
          fi

      - name: "Running local action: ${{ github.repository }} 🔨"
        uses: ./
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
