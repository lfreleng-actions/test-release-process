---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

# test-release-process
name: '📄 Generate Pull Request'
description: 'Generates a pull request'

inputs:
  token:
    description: 'Github token with the required permissions'
    # type: 'string'
    required: true

runs:
  using: "composite"
  steps:
    # yamllint disable-line rule:line-length
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false

    - name: 'Write the date to a file 📆'
      id: date
      shell: bash
      run: |
        # Write the date to a file 📆
        date=$(date +"%Y %B %d %R %Z")
        short_date=$(date +"%Y-%m-%d")
        year=$(date +"%Y")
        echo "date=$date" >> "$GITHUB_OUTPUT"
        echo "short_date=$short_date" >> "$GITHUB_OUTPUT"
        echo "Writing date to file: $date > date.txt"
        # Output inline but also output to step summary for clarity
        echo "Writing date to file: $date > date.txt" >> "$GITHUB_STEP_SUMMARY"
        # SPDX tags keep the generated file REUSE compliant
        # REUSE-IgnoreStart
        {
          echo "# SPDX-License-Identifier: Apache-2.0"
          echo "# SPDX-FileCopyrightText: $year The Linux Foundation"
          echo ""
          echo "$date"
        } > date.txt
        # REUSE-IgnoreEnd

    - name: 'Detect change 🔍'
      id: detect
      shell: bash
      run: |
        # Detect repository changes
        if [[ $(git status --porcelain) ]]; then
          echo "changes=true" >> "$GITHUB_OUTPUT"
          echo 'Changes made to repository; generating pull request ✅'
          echo '# Pull Request' >> "$GITHUB_STEP_SUMMARY"
          echo 'Changes made to repository ✅' >> "$GITHUB_STEP_SUMMARY"
        else
          echo "changes=false" >> "$GITHUB_OUTPUT"
          echo 'No changes made to repository 💬'
        fi

    - name: 'Raise Pull Request ⬇️'
      if: steps.detect.outputs.changes == 'true'
      # yamllint disable rule:line-length
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
      with:
        token: ${{ inputs.token }}
        # Conventional commit type keeps gitlint and the semantic pull
        # request check happy; short date keeps the subject within 50 chars
        # yamllint disable-line rule:line-length
        commit-message: "Chore: Update date stamp ${{ steps.date.outputs.short_date }}"
        signoff: 'true'
        sign-commits: 'true'
        branch: automated-pr
        delete-branch: true
        title: "Chore: Update date stamp ${{ steps.date.outputs.short_date }}"
        body: |
          ## Pull Request/Update Summary
          ${{ steps.date.outputs.date }} > date.txt

          *Auto-generated by [lfreleng-actions/test-release-process][1]*

          [1]: https://github.com/lfreleng-actions/test-release-process

        labels: |
          automated pr
        draft: false
